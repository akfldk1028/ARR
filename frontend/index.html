<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/x-icon" href="/favicon.ico" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta
			http-equiv="Content-Security-Policy"
			content="script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.amplitude.com https://maps.googleapis.com https://*.vworld.kr http://*.vworld.kr https://code.jquery.com blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.vworld.kr http://*.vworld.kr; font-src 'self' https://fonts.gstatic.com https://*.vworld.kr http://*.vworld.kr data:; connect-src 'self' http://127.0.0.1:* http://localhost:* https://*.vworld.kr http://*.vworld.kr https://*.amplitude.com ws: wss:; worker-src 'self' https://*.vworld.kr http://*.vworld.kr blob:; img-src 'self' https://*.vworld.kr http://*.vworld.kr data: blob:; child-src 'self' blob:; frame-src 'self' localfile: blob:;"
		/>
		<!-- Google Fonts for Google Maps Demo -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" />
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" />
		<script>
			window.addEventListener('load', () => {
				if (/^(localhost|127\.0\.0\.1)$/.test(window.location.hostname)) return;
				const loadScript = (src) => new Promise((resolve, reject) => {
					const script = document.createElement('script');
					script.src = src;
					script.async = true;
					script.onload = resolve;
					script.onerror = reject;
					document.head.appendChild(script);
				});
				loadScript('https://cdn.amplitude.com/libs/analytics-browser-2.11.1-min.js.gz')
					.then(() => loadScript('https://cdn.amplitude.com/libs/plugin-session-replay-browser-1.8.0-min.js.gz'))
					.then(() => {
						if (window.amplitude && window.sessionReplay) {
							window.amplitude.add(window.sessionReplay.plugin({ sampleRate: 1 }));
							window.amplitude.init('87ce6adbb14b24ffe1703d18bf405e40', { autocapture: { elementInteractions: true } });
						}
					})
					.catch(() => {});
			});
		</script>
		<title>Eigent</title>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
