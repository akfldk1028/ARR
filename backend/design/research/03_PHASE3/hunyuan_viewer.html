<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Hunyuan3D-2 Demo Viewer</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body { margin: 0; background: #1a1a1a; color: #eee; font-family: system-ui; }
    header { padding: 12px 20px; background: #2a2a2a; border-bottom: 1px solid #444; }
    header h1 { margin: 0; font-size: 16px; }
    header small { color: #888; }
    main { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #444; height: calc(100vh - 50px); }
    .panel { background: #1a1a1a; display: flex; flex-direction: column; }
    .panel h2 { margin: 0; padding: 8px 16px; font-size: 13px; background: #252525; border-bottom: 1px solid #333; }
    .input-img { display: flex; align-items: center; justify-content: center; flex: 1; padding: 20px; }
    .input-img img { max-width: 100%; max-height: 100%; border: 1px solid #333; }
    model-viewer { flex: 1; background: #2a2a2a; --poster-color: transparent; }
    .meta { padding: 8px 16px; font-size: 12px; color: #aaa; background: #252525; border-top: 1px solid #333; }
    .drop-zone { border: 2px dashed #555; border-radius: 8px; padding: 40px; text-align: center; color: #888; cursor: pointer; margin: 20px; }
    .drop-zone:hover { border-color: #888; background: #2a2a2a; }
  </style>
</head>
<body>
  <header>
    <h1>Hunyuan3D-2 — image → 3D mass demo</h1>
    <small>왼쪽: 입력 이미지 / 오른쪽: 생성된 3D mesh (.glb 드롭하거나 자동 로드)</small>
  </header>
  <main>
    <div class="panel">
      <h2>Input Image</h2>
      <div class="input-img">
        <img id="inputImg" src="hunyuan_demo_input.png" alt="input" onerror="this.style.display='none'; document.getElementById('noInput').style.display='block';">
        <div id="noInput" style="display:none; color:#666;">입력 이미지 없음 — hunyuan_demo_input.png</div>
      </div>
      <div class="meta">파일: <code>hunyuan_demo_input.png</code></div>
    </div>
    <div class="panel">
      <h2>Generated 3D Mesh</h2>
      <model-viewer
        id="viewer"
        src="hunyuan_demo_shape.glb"
        alt="Generated 3D mass"
        camera-controls
        auto-rotate
        shadow-intensity="1"
        environment-image="neutral"
        exposure="1.0"
      >
      </model-viewer>
      <div class="meta" id="meshMeta">파일: <code>hunyuan_demo_shape.glb</code> — 드래그로 회전, 스크롤로 줌</div>
    </div>
  </main>
  <script>
    document.body.addEventListener('dragover', e => { e.preventDefault(); });
    document.body.addEventListener('drop', e => {
      e.preventDefault();
      const file = e.dataTransfer.files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      if (file.name.endsWith('.glb') || file.name.endsWith('.gltf')) {
        document.getElementById('viewer').src = url;
        document.getElementById('meshMeta').innerHTML = `파일: <code>${file.name}</code> (${(file.size/1024).toFixed(1)} KB)`;
      } else if (file.type.startsWith('image/')) {
        document.getElementById('inputImg').src = url;
        document.getElementById('inputImg').style.display = '';
        document.getElementById('noInput').style.display = 'none';
      }
    });
  </script>
</body>
</html>
